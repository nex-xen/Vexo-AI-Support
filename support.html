<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vexo AI Support</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#202123;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
color:#ECECF1;
overflow:hidden;
}

.card{
width:90%;
max-width:420px;
background:#2A2B32;
padding:30px;
border-radius:14px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

h1{
margin-top:0;
font-size:26px;
text-align:center;
margin-bottom:25px;
}

input, textarea{

width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:8px;
background:#202123;
color:#ECECF1;
font-size:15px;

}

textarea{
height:120px;
resize:none;
}

button{

width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#10A37F;
color:white;
font-size:16px;
font-weight:600;
cursor:pointer;

}

button:hover{
background:#0d8f6f;
}

.footer{
text-align:center;
margin-top:15px;
font-size:12px;
color:#888;
}

</style>

</head>

<body>

<div class="card">

<h1>Support</h1>

<input id="name" type="text" placeholder="Your Name">

<input id="email" type="email" placeholder="Your Email">

<textarea id="message" placeholder="Describe your issue..."></textarea>

<button onclick="sendMail()">Send Message</button>

<div class="footer">
Vexo AI Support
</div>

</div>

<script>

function sendMail(){

let name = document.getElementById("name").value;
let email = document.getElementById("email").value;
let message = document.getElementById("message").value;

let subject = encodeURIComponent("Vexo AI Support Request");

let body = encodeURIComponent(
"Name: " + name + "\n" +
"Email: " + email + "\n\n" +
"Message:\n" + message
);

window.location.href =
"mailto:support@vexoai.app?subject=" + subject + "&body=" + body;

}

</script>

</body>

</html>
